<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>мЮСлђЉ мГБмДЄ ¬Ј мШБлПЩмЧРлНімЫР</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--cream:#F4EDE0;--ink:#2A1F14;--gold:#8B6F47;--line:#d8c9b0;--high:#6b8e4e;--medium:#c79a3c;--danger:#b0472b;
      --sow:#6b8e4e;--flo:#c79a3c;--mid:#9a7bb0;--harv:#b0472b;--today:#c0392b;--band:#cfe0b8;}
*{box-sizing:border-box}
body{margin:0;background:var(--cream);color:var(--ink);font-family:'Noto Sans KR',sans-serif;line-height:1.6}
.wrap{max-width:940px;margin:0 auto;padding:16px 14px 60px}
.back{display:inline-block;font-size:.85rem;color:var(--gold);text-decoration:none;margin-bottom:12px}
.back:hover{text-decoration:underline}
.chead{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap;margin-bottom:4px}
h1{font-family:'Gowun Batang',serif;font-size:1.9rem;margin:0}
.tag{font-size:.78rem;border:1px solid var(--line);border-radius:20px;padding:3px 11px;color:#6b5536;background:#fff}
.tag.season{border-color:var(--gold);color:var(--gold)}
.metaline{font-size:.82rem;color:#9a8a70;margin-bottom:16px;line-height:1.6}
.conf{font-size:.72rem;padding:2px 9px;border-radius:10px;white-space:nowrap}
.conf.high{background:#eef4e6;color:var(--high)}

.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.card h2{font-family:'Gowun Batang',serif;font-size:1.1rem;margin:0 0 10px;color:var(--ink)}
.tl-wrap{overflow-x:auto}
.tl-legend{display:flex;flex-wrap:wrap;gap:14px;font-size:.82rem;color:#6b5536;margin-top:10px;align-items:center;background:#faf6ee;border:1px solid var(--line);border-radius:8px;padding:8px 12px}
.tl-legend .it{display:flex;align-items:center;gap:6px}
.tl-legend .sw{width:20px;height:11px;border-radius:3px;display:inline-block}
.tl-legend .mk{width:13px;height:13px;display:inline-block}
.tl-sum{font-size:.8rem;color:#4a3f30;margin-top:10px;line-height:1.7}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}
.box{border:1px solid var(--line);border-radius:9px;padding:10px 12px;background:#fbf7ef}
.box .k{font-size:.76rem;font-weight:700;color:var(--gold);margin-bottom:5px;display:flex;align-items:center;gap:5px}

.tgt{display:inline-block;font-size:.75rem;background:#f3ece0;border:1px solid var(--line);border-radius:12px;padding:2px 9px;margin:4px 4px 0 0}
.small{font-size:.78rem;color:#9a8a70;line-height:1.6}
/* вФАвФА лСРлСС нТАмЬДм†ѓ (crop_log.html мЭімЛЭ) вФАвФА */
.soilsel{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.soilbtn{font-family:inherit;font-size:.86rem;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:20px;padding:6px 15px;cursor:pointer}
.soilbtn.on{background:var(--gold);color:#fff;border-color:var(--gold)}

.mulch-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:2px 0 6px}
.mulch-lbl{font-size:.8rem;color:var(--gold);font-weight:500;margin-right:2px}
.mbtn{font-family:inherit;font-size:.8rem;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:20px;padding:5px 12px;cursor:pointer}
.mbtn.on{background:var(--gold);color:#fff;border-color:var(--gold)}
.mulch-note{font-size:.76rem;color:#4a3f30;background:#fbf7ef;border-radius:6px;padding:7px 10px;margin-bottom:8px;line-height:1.5}
.svgwrap{background:#fbf7ef;border:1px solid var(--line);border-radius:10px;padding:6px 4px;margin-bottom:10px}
.bsl{margin-bottom:11px}
.bsl-h{display:flex;justify-content:space-between;align-items:baseline}
.bsl-lab{font-size:.83rem;font-weight:500;color:var(--ink)}

.bsl input[type=range]{width:100%;margin:3px 0 0;accent-color:var(--gold)}
.bsl-j{font-size:.76rem;margin-top:2px;display:flex;align-items:baseline;gap:5px;line-height:1.45;color:#4a3f30}

.bed-summary{font-size:.8rem;border-left:3px solid var(--line);padding:7px 11px;background:#fbf7ef;border-radius:6px;margin-top:4px}
.state{padding:40px 16px;text-align:center;color:#9a8a70;font-size:.9rem}
.tip{position:fixed;display:none;background:var(--ink);color:#fff;font-size:.76rem;padding:7px 10px;border-radius:6px;max-width:250px;pointer-events:none;z-index:30;line-height:1.45}
.tlguide{position:fixed;width:0;border-left:1px dashed rgba(42,31,20,0.5);pointer-events:none;z-index:29;display:none}
.ctrls{display:flex;flex-wrap:wrap;gap:18px;align-items:center;margin:2px 0 12px;padding:10px 12px;background:#fbf7ef;border:1px solid var(--line);border-radius:8px}
.ctrl{display:flex;align-items:center;gap:8px;font-size:.8rem;color:#6b5536}
.ctrl > label{font-weight:700;color:var(--gold);white-space:nowrap}
.ctrl input[type=range]{width:130px;accent-color:var(--gold)}
.ctrl .val{font-weight:700;color:var(--ink);min-width:46px}
.rst{font-family:inherit;font-size:.75rem;border:1px solid var(--line);background:#fff;color:#6b5536;border-radius:14px;padding:3px 10px;cursor:pointer}
.status{background:#fff;border:1px solid var(--line);border-left:4px solid var(--sow);border-radius:12px;padding:12px 15px;margin-bottom:14px}
.st-h{font-family:'Gowun Batang',serif;font-size:1.02rem;margin:0 0 6px;color:var(--ink);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.st-today{font-size:.72rem;color:#9a8a70;font-weight:400}
.st-body{font-size:.88rem;color:#4a3f30;line-height:1.7}
.st-body b{color:var(--ink)}
.st-tasks{margin-top:5px;font-size:.82rem;color:#6b5536}
.st-tag{display:inline-block;font-size:.72rem;border-radius:10px;padding:2px 9px;margin:3px 5px 0 0;background:#f3ece0;color:#6b5536}
.badge-off{font-size:.72rem;background:#fdf4e3;color:#b8892f;border-radius:10px;padding:2px 9px}
.pest-item{border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:8px;background:#fbf7ef}
.pest-hd{font-size:.9rem;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pest-hd b{color:var(--ink)}
.pbadge{font-size:.68rem;font-weight:700;border-radius:9px;padding:2px 8px;color:#fff}
.pbadge.dis{background:#9b3d3d}
.pbadge.pest{background:#b5842b}
.psev{font-size:.68rem;border-radius:9px;padding:1px 7px}
.psev.high{background:#f6dede;color:#9b3d3d}
.psev.mid{background:#f1ece0;color:#8a7a55}
.pest-time{font-size:.75rem;color:#9a8a70;margin-left:auto}
.pest-l{font-size:.82rem;color:#4a3f30;margin-top:4px;line-height:1.55}
.pest-l .pk{font-weight:700;color:var(--gold);margin-right:4px}
.pest-src{font-size:.74rem;color:#9a8a70;margin-top:4px}
.pest-src a{color:#6b5536}
@media(min-width:1600px){ h1{font-size:2.4rem} body{font-size:1.05rem} .card h2{font-size:1.3rem} }
</style></head>

  <a class="back" id="backlink" href="/crop_calendar.html">вЖР мЮђл∞∞ лЛђл†•</a>
  <div id="app"><div class="state">лґИлЯђмШ§лКФ м§СвА¶</div></div>
</div>
<div class="tip" id="tip"></div>
<div class="tlguide" id="tlguide"></div>

<script>
const $ = s => document.querySelector(s);
const C = {r:'#C0392B', y:'#BA7517', g:'#3B6D11'};
const soilFill = {'л™®лЮШмІИ':'#D8C39A','м∞ЄнЭЩ':'#C6A16E','мІИм∞ЄнЭЩ':'#B08A5A','мІДнЭЩмІИ':'#AC744E'};
const MK = {sowing:'var(--sow)', flowering:'var(--flo)', mid:'var(--mid)', harvest:'var(--harv)'};
const PHC = {sowing:'#6b8e4e', grow:'#9a7bb0', harvest:'#b0472b'};
const MONTH_CUM = [0,31,59,90,120,151,181,212,243,273,304,334,365];
const mid = a => Math.round((a[0]+a[1])/2);
const V = {};
let curBed=null, mulch='side', curSoilSel='м∞ЄнЭЩ', ENTRY=null, STAGES=null;
let SOW_OFFSET=0, ZOOM=1, CUR_TL=null;

function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function qp(k){ return new URLSearchParams(location.search).get(k) || ''; }
function todayDoy(){ const n=new Date(); const s=new Date(n.getFullYear(),0,1); return Math.floor((n-s)/86400000)+1; }
function doyToLabel(doy){ let d=((doy-1)%365+365)%365; const dt=new Date(2026,0,1); dt.setDate(dt.getDate()+d); return (dt.getMonth()+1)+'/'+dt.getDate(); }

/* вФАвФА лЛђл†• мЭЄнПђкЈЄлЮШнФљ нГАмЮДлЭЉмЭЄ (мДЬл≤Д timeline кµђм°∞ кЄ∞л∞Ш) вФАвФА */
function monthBounds(d, which){
  var yr=Math.floor(d/365), within=d-yr*365, m=0;
  for(var i=0;i<12;i++){ if(within>=MONTH_CUM[i]) m=i; }
  return which==='end' ? (yr*365+MONTH_CUM[m+1]) : (yr*365+MONTH_CUM[m]);
}
function drawTimeline(tl){
  if(!tl) return '';
  var phases=tl.phases||[], prep=tl.prep||[], care=tl.care||[], mon=tl.monsoon||null;
  var sowP=phases.filter(function(p){return p.key==='sowing';})[0];
  var harvP=phases.filter(function(p){return p.key==='harvest';})[0];
  var sowStart = sowP ? sowP.start : (phases.length ? Math.min.apply(null,phases.map(function(p){return p.start;})) : 0);
  var wrap = !!(harvP && sowP && harvP.start < sowP.start);
  function sh(d){ return (wrap && d < sowStart) ? d+365 : d; }

  var act=[];
  phases.forEach(function(p){ act.push(sh(p.start),sh(p.end)); });
  prep.forEach(function(p){ if(p.doy!=null)act.push(sh(p.doy)); if(p.start!=null){act.push(sh(p.start),sh(p.end));} });
  care.forEach(function(c){ if(c.doy!=null)act.push(sh(c.doy)); if(c.start!=null){act.push(sh(c.start),sh(c.end));} if(c.doys)c.doys.forEach(function(d){act.push(sh(d));}); });
  if(!act.length) return '';
  var minA=Math.min.apply(null,act), maxA=Math.max.apply(null,act);

  var monDraw=[];
  if(mon){
    for(var yo=0;yo<=1;yo++){
      var ms=mon.start+yo*365, me=mon.end+yo*365;
      if(me>=minA-30 && ms<=maxA+30){ monDraw.push([ms,me]); minA=Math.min(minA,ms); maxA=Math.max(maxA,me); }
    }
  }
  var axMin=monthBounds(minA-4,'start'), axMax=monthBounds(maxA+4,'end');
  if(axMax-axMin<60) axMax=axMin+60;

  var W=880, padL=56, padR=14, padT=30, plotW=W-padL-padR;
  var laneH=26, gap=6;
  var pests=tl.pests||[];
  var hasPests=pests.some(function(p){ return p.start!=null; });
  var yPrep=padT, yPhase=padT+laneH+gap, yCare=padT+2*(laneH+gap);
  var yPest=hasPests?(yCare+laneH+gap):null;
  var _actN=((window.__ACTUALS||[]).length);
  var yActual=null, _pestBot=(hasPests?yPest:yCare)+laneH;
  if(_actN){ yActual=_pestBot+gap+6; }
  var laneBot=(_actN? (yActual+_actN*22) : _pestBot), H=laneBot+24;
  var x=function(d){ return padL + ((d-axMin)/(axMax-axMin))*plotW; };
  var s='<svg id="tlsvg" viewBox="0 0 '+W+' '+H+'" width="100%" style="min-width:660px" xmlns="http://www.w3.org/2000/svg">';

  var mi=0;
  for(var da=axMin; da<axMax; ){
    var me2=Math.min(monthBounds(da,'end'), axMax);
    if(mi%2===1) s+='<rect x="'+x(da)+'" y="'+padT+'" width="'+(x(me2)-x(da))+'" height="'+(laneBot-padT)+'" fill="rgba(139,111,71,0.04)"/>';
    da=me2; mi++;
  }
  monDraw.forEach(function(mm){
    var a=Math.max(mm[0],axMin), b=Math.min(mm[1],axMax); if(b<=a) return;
    s+='<rect x="'+x(a)+'" y="'+padT+'" width="'+(x(b)-x(a))+'" height="'+(laneBot-padT)+'" fill="rgba(74,120,176,0.14)"/>';
    s+='<text x="'+((x(a)+x(b))/2)+'" y="'+(padT-17)+'" text-anchor="middle" fill="#4a78b0" font-size="10">'+esc(mon.label)+'</text>';
  });
  for(var db=axMin; db<axMax+1; ){
    var xm=x(db);
    s+='<line x1="'+xm+'" y1="'+padT+'" x2="'+xm+'" y2="'+laneBot+'" stroke="#e0d6c2"/>';
    var yr2=Math.floor(db/365), wi=db-yr2*365, mo=0; for(var i2=0;i2<12;i2++){ if(wi>=MONTH_CUM[i2]) mo=i2; }
    s+='<text x="'+(xm+3)+'" y="'+(padT-5)+'" fill="#9a8a70" font-size="10">'+(mo+1)+'мЫФ</text>';
    [10,20].forEach(function(dd){ var xd=x(db+dd); if(db+dd<axMax) s+='<line x1="'+xd+'" y1="'+padT+'" x2="'+xd+'" y2="'+laneBot+'" stroke="#efe7d6" stroke-dasharray="2 3"/>'; });
    db=monthBounds(db,'end');
  }
  s+='<line x1="'+padL+'" y1="'+laneBot+'" x2="'+(W-padR)+'" y2="'+laneBot+'" stroke="#d8c9b0"/>';

  function laneLabel(y,t){ return '<text x="4" y="'+(y+laneH/2+4)+'" fill="#8B6F47" font-size="10" font-weight="700">'+t+'</text>'; }
  s+=laneLabel(yPrep,'\ubc2d\uc900\ube44')+laneLabel(yPhase,'\uc7ac\ubc30')+laneLabel(yCare,'\uad00\ub9ac');

  prep.forEach(function(p){
    var tip=esc(p.label+(p.note?(' \u00b7 '+p.note):''));
    if(p.start!=null){
      var x0=x(sh(p.start)), x1=x(sh(p.end)), w=Math.max(4,x1-x0);
      s+='<rect class="tlmk" data-tip="'+tip+'" x="'+x0+'" y="'+(yPrep+6)+'" width="'+w+'" height="14" rx="4" fill="#8B6F47" opacity="0.85"/>';
      if(w>44) s+='<text x="'+((x0+x1)/2)+'" y="'+(yPrep+17)+'" text-anchor="middle" fill="#fff" font-size="9.5">'+esc(p.label)+'</text>';
    } else if(p.doy!=null){
      var xx=x(sh(p.doy));
      s+='<path class="tlmk" data-tip="'+tip+'" d="M'+xx+' '+(yPrep+6)+' l6 7 l-6 7 l-6 -7 z" fill="#8B6F47"/>';
      s+='<text x="'+xx+'" y="'+(yPrep+4)+'" text-anchor="middle" fill="#8B6F47" font-size="9">'+esc(p.label)+'</text>';
    }
  });
  phases.forEach(function(p){
    var x0=x(sh(p.start)), x1=x(sh(p.end)), w=Math.max(5,x1-x0), col=PHC[p.key]||'#8B6F47';
    var tip=esc(p.label+' \u00b7 '+doyToLabel(p.start)+'~'+doyToLabel(p.end));
    s+='<rect class="tlmk" data-tip="'+tip+'" x="'+x0+'" y="'+(yPhase+4)+'" width="'+w+'" height="18" rx="6" fill="'+col+'" opacity="0.9"/>';
    if(p.opt_start!=null){
      var o0=x(sh(p.opt_start)), o1=x(sh(p.opt_end)), ow=Math.max(3,o1-o0);
      s+='<rect class="tlmk" data-tip="'+esc('\ucd5c\uc801 \ud30c\uc885 \u00b7 '+doyToLabel(p.opt_start)+'~'+doyToLabel(p.opt_end))+'" x="'+o0+'" y="'+(yPhase+4)+'" width="'+ow+'" height="18" rx="6" fill="'+col+'"/>';
      s+='<rect x="'+o0+'" y="'+(yPhase+4)+'" width="'+ow+'" height="18" rx="6" fill="none" stroke="#fff" stroke-width="1" stroke-dasharray="2 2"/>';
    }
    if(w>48) s+='<text x="'+((x0+x1)/2)+'" y="'+(yPhase+17)+'" text-anchor="middle" fill="#fff" font-size="10" font-weight="500">'+esc(p.label)+'</text>';
    else s+='<text x="'+((x0+x1)/2)+'" y="'+(yPhase+2)+'" text-anchor="middle" fill="'+col+'" font-size="9">'+esc(p.label)+'</text>';
  });
  function fertMark(xx,tip){ return '<path class="tlmk" data-tip="'+esc(tip)+'" d="M'+xx+' '+(yCare+1)+' l5 6 l-5 6 l-5 -6 z" fill="#c79a3c"/>'+'<text x="'+xx+'" y="'+(yCare+25)+'" text-anchor="middle" fill="#a5791f" font-size="7.5">лєДл£М</text>'; }
  function sprayMark(xx,tip,num,word){ var m='<circle class="tlmk" data-tip="'+esc(tip)+'" cx="'+xx+'" cy="'+(yCare+13)+'" r="6" fill="#3f86a6"/>'; if(num!=null) m+='<text x="'+xx+'" y="'+(yCare+16)+'" text-anchor="middle" fill="#fff" font-size="8">'+num+'</text>'; if(word) m+='<text x="'+xx+'" y="'+(yCare+25)+'" text-anchor="middle" fill="#3f6f86" font-size="7.5">л∞©м†Ь</text>'; return m; }
  care.forEach(function(c){
    if(c.kind==='fert'){
      if(c.start!=null) s+=fertMark(x(sh(Math.round((c.start+c.end)/2))), c.label+' \u00b7 '+doyToLabel(c.start)+'~'+doyToLabel(c.end));
      else if(c.doy!=null) s+=fertMark(x(sh(c.doy)), c.label+' \u00b7 '+doyToLabel(c.doy));
    } else if(c.kind==='spray'){
      if(c.doys) c.doys.forEach(function(d,i){ s+=sprayMark(x(sh(d)), c.label+' '+(i+1)+'\ud68c \u00b7 '+doyToLabel(d)+(c.note?(' ('+c.note+')'):''), c.doys.length>1?(i+1):null, i===0); });
      else if(c.doy!=null) s+=sprayMark(x(sh(c.doy)), c.label+' \u00b7 '+doyToLabel(c.doy), null, true);
    }
  });
  if(hasPests){
    var PC={disease:'#9b3d3d', pest:'#b5842b'};
    s+=laneLabel(yPest,'л≥СнХімґ©');
    pests.forEach(function(p){
      if(p.start==null) return;
      var ps0=sh(p.start), pe0=sh(p.end!=null?p.end:p.start);
      if(pe0<axMin || ps0>axMax) return;
      var x0=x(Math.max(ps0,axMin)), x1=x(Math.min(pe0,axMax)), w=Math.max(5,x1-x0);
      var col=PC[p.type]||'#9b3d3d';
      var op=p.severity==='high'?0.92:(p.severity==='low'?0.5:0.72);
      var tip=esc((p.type==='pest'?'[нХімґ©] ':'[л≥С] ')+p.name+' ¬Ј '+(p.time||(doyToLabel(p.start)+(p.end!=null?('~'+doyToLabel(p.end)):''))));
      s+='<rect class="tlmk" data-tip="'+tip+'" x="'+x0+'" y="'+(yPest+6)+'" width="'+w+'" height="14" rx="4" fill="'+col+'" opacity="'+op+'"/>';
      if(w>52) s+='<text x="'+((x0+x1)/2)+'" y="'+(yPest+17)+'" text-anchor="middle" fill="#fff" font-size="9.5">'+esc(p.name)+'</text>';
    });
  }
  var td=todayDoy(), tds=(wrap && td<sowStart)?td+365:td;
  if(tds>=axMin&&tds<=axMax){
    var tx=x(tds);
    s+='<line x1="'+tx+'" y1="'+(padT-2)+'" x2="'+tx+'" y2="'+laneBot+'" stroke="var(--today)" stroke-width="2"/>';
    s+='<text x="'+tx+'" y="'+(laneBot+14)+'" text-anchor="middle" fill="var(--today)" font-size="10">\uc624\ub298 '+doyToLabel(td)+'</text>';
  }

    html += '<div class="small" style="margin-top:6px">мКђлЭЉмЭілНФл°Ь мєШмИШл•Љ л∞ФкњФл≥ік≥†, нЖ†мІИ¬Јл©Амє≠л≥Д м†Бм†Х мЧђлґАл•Љ нЩХмЭЄнХШмДЄмЪФ. нСЬм§А л≤ФмЬД кЄ∞м§АмЭіл©∞ мЛ§м†ЬлКФ л∞≠ мГБнГЬл°Ь м°∞м†ХнХ©лЛИлЛ§.</div>';
    html += '</div>';
  } else if(e.bed){
    var b=e.bed;
    var lines=[b.ridge_height?('лЖТмЭі: '+b.ridge_height):'', b.ridge_width?('мЬЧл©і: '+b.ridge_width):'',
               b.row_spacing?('лСРлСС к∞Дк≤©: '+b.row_spacing):'', b.rows_per_bed?('м§Д мИШ: '+b.rows_per_bed):'',
               b.plant_spacing?('нПђкЄ∞ к∞Дк≤©: '+b.plant_spacing):'', b.mulch?('л©Амє≠: '+b.mulch):''].filter(Boolean);
    if(lines.length) html += '<div class="card"><h2>лСРлСС мХИлВі</h2><div class="small">'+esc(lines.join(' / ')).replace(/\//g,'<br>')+'</div></div>';
  }

  if(Array.isArray(e.pests) && e.pests.length){
    html += '<div class="card"><h2>л≥СнХімґ©</h2>';
    html += e.pests.map(function(p){
      var badge = p.type==='pest' ? '<span class="pbadge pest">нХімґ©</span>' : '<span class="pbadge dis">л≥С</span>';
      var sev = p.severity==='high' ? '<span class="psev high">м£ЉмЭШ</span>' : (p.severity==='low' ? '' : '<span class="psev mid">л≥інЖµ</span>');
      var src = p.source_url ? ('<a href="'+esc(p.source_url)+'" target="_blank" rel="noopener">'+esc(p.source||'мґЬм≤Ш')+'</a>') : esc(p.source||'');
      return '<div class="pest-item">'
        +'<div class="pest-hd">'+badge+' <b>'+esc(p.name)+'</b> '+sev+' <span class="pest-time">'+esc(p.time||p.stage||'')+'</span></div>'
        +(p.symptom?('<div class="pest-l"><span class="pk">м¶ЭмГБ</span> '+esc(p.symptom)+'</div>'):'')
        +(p.management?('<div class="pest-l"><span class="pk">л∞©м†Ь</span> '+esc(p.management)+'</div>'):'')
        +(src?('<div class="pest-src">мґЬм≤Ш: '+src+'</div>'):'')
        +'</div>';
    }).join('');
    html += '<div class="small" style="margin-top:6px">л≥СнХімґ© мЛЬкЄ∞¬Јл∞©м†ЬлКФ мІАмЧ≠¬ЈмЧ∞лПД¬ЈкЄ∞мГБмЧР лФ∞лЭЉ лЛђлЭЉмІСлЛИлЛ§. мґЬм≤Ш мЮРл£Мл•Љ нХ®кїШ нЩХмЭЄнХШмДЄмЪФ.</div>';
    html += '</div>';
  }
  if(Array.isArray(e.sources) && e.sources.length){
    html += '<div class="small" style="text-align:center;margin-top:8px">мЮРл£М мґЬм≤Ш: '+e.sources.map(esc).join(' ¬Ј ')+'</div>';
  }

  $('#app').innerHTML = html;

  if(CUR_TL){
    var _so=$('#sowoff'), _zm=$('#zoom');
    if(_so) _so.addEventListener('input', function(){ SOW_OFFSET=+_so.value; redrawTimeline(); });
    if($('#sowrst')) $('#sowrst').addEventListener('click', function(){ SOW_OFFSET=0; if(_so)_so.value=0; redrawTimeline(); });
    if(_zm) _zm.addEventListener('input', function(){ ZOOM=+_zm.value; var zv=$('#zoomv'); if(zv)zv.textContent=ZOOM.toFixed(1)+'√Ч'; applyZoom(); });
    redrawTimeline();
  } else { bindTimelineTips(); }

  if(hasSlider){
    document.querySelectorAll('#soilsel .soilbtn').forEach(function(b){ b.addEventListener('click', function(){ setSoil(b.dataset.s); }); });
    document.querySelectorAll('#mulchRow .mbtn').forEach(function(b){ b.addEventListener('click', function(){ setMulch(b.dataset.m); }); });
    buildSliders(curBed); syncMulchButtons(); renderBed();
  }
}

function setBack(){
  var from=qp('from'), bl=$('#backlink'); if(!bl) return;
  if(from==='dashboard'){ bl.textContent='вЖР нШДнЩ©нМР'; bl.setAttribute('href','/dashboard.html'); }
  else { bl.textContent='вЖР мЮђл∞∞ лЛђл†•'; bl.setAttribute('href','/crop_calendar.html'); }
}
async function init(){
  setBack();
  var crop=qp('crop'), season=qp('season');
  if(!crop){ $('#app').innerHTML='<div class="state">мЮСлђЉмЭі мІАм†ХлРШмІА мХКмХШмКµлЛИлЛ§.<br>мЮђл∞∞ лЛђл†•мЧРмДЬ мЮСлђЉмЭД мД†нГЭнХШмДЄмЪФ.</div>'; return; }
  try{
    var url='/api/crop-detail?crop='+encodeURIComponent(crop)+(season?('&season='+encodeURIComponent(season)):'');
    var d=await (await fetch(url)).json();
    if(!d || !d.ok){ $('#app').innerHTML='<div class="state">гАМ'+esc(crop)+'гАН мЮђл∞∞л†•мЭД м∞ЊмІА л™їнЦИмКµлЛИлЛ§.</div>'; return; }
    document.title = d.crop+' ¬Ј мЮСлђЉ мГБмДЄ';
    try{ var _av=await (await fetch('/api/crop-actuals?crop='+encodeURIComponent(crop))).json(); window.__ACTUALS=(_av&&_av.actuals)||[]; }catch(e){ window.__ACTUALS=[]; }
    try{ var _sv=await (await fetch('/api/crop-sprays?crop='+encodeURIComponent(crop))).json(); window.__SPRAYS=(_sv&&_sv.sprays)||[]; }catch(e){ window.__SPRAYS=[]; }  /* CROP-SPRAY-MARKS */
    render(d);
  }catch(err){
    $('#app').innerHTML='<div class="state">лґИлЯђмШ§кЄ∞ мЛ§нМ®. мЮ†мЛЬ нЫД лЛ§мЛЬ мЛЬлПДнХШмДЄмЪФ.</div>';
  }
}
init();
</script>
